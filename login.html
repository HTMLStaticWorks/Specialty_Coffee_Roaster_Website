<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Brewora</title>
    <meta name="description"
        content="Login to your Brewora account to access exclusive features and order your favorite coffee">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Caveat:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Additional CSS for Login Page -->
    <style>
        /* Update to professional fonts */
        :root {
            --font-primary: 'Times New Roman', Times, serif;
            --font-secondary: 'Times New Roman', Times, serif;
        }

        /* Full viewport layout - no scrolling */
        .auth-page-wrapper {
            /* Inherits shared calc from style.css */
            display: flex;
            flex-direction: column;
        }

        .auth-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: var(--space-sm);
            background: linear-gradient(135deg, rgba(44, 24, 16, 0.92), rgba(74, 44, 26, 0.92)),
                url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1200&h=800&fit=crop&auto=format') center/cover;
            position: relative;
        }

        .auth-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.1);
            z-index: 1;
        }

        .auth-form-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
        }

        .auth-form-container {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow-heavy);
            border: 1px solid rgba(212, 165, 116, 0.1);
            position: relative;
            /* For absolutely positioned toggles */
        }

        /* Controls moved to .auth-page-floating-controls (see style.css) */

        .auth-form h3 {
            color: var(--primary-brown);
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin-bottom: 0.5rem;
            text-align: center;
            font-family: var(--font-primary);
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-weight: 500;
        }

        .auth-form .welcome-sentence {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.25rem;
            font-family: var(--font-secondary);
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 0.65rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.35rem;
            color: var(--primary-brown);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--light-brown);
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition-fast);
            background: var(--light-cream);
            font-family: var(--font-secondary);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
            background: var(--bg-card);
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            width: 100%;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-gold);
        }

        .form-checkbox label {
            color: var(--text-muted);
            font-size: 17px !important;
        }

        .forgot-password-link {
            font-size: 17px !important;
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password-link:hover {
            color: var(--primary-brown);
            text-decoration: underline;
        }

        /* Premium Login Button Design */
        .btn-login {
            width: 100%;
            display: block;
            margin: 0;
            padding: 0.85rem var(--space-lg);
            background: linear-gradient(135deg, var(--accent-gold), var(--light-gold));
            color: #111111;
            /* Always dark brown for visibility on gold background */
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: var(--font-secondary);
            cursor: pointer;
            transition: var(--transition-smooth);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow-light);
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }

        .btn-login:focus {
            outline: 2px solid var(--accent-gold);
            outline-offset: 2px;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .form-links {
            text-align: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--cream);
        }

        .form-links p {
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-links a {
            color: var(--accent-gold);
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition-fast);
        }

        .form-links a:hover {
            color: var(--primary-brown);
            text-decoration: underline;
        }

        /* Social login buttons */
        .social-login {
            margin-top: var(--space-sm);
            padding-top: var(--space-sm);
            border-top: 1px solid var(--cream);
        }

        .social-login h4 {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .social-buttons {
            display: flex;
            gap: var(--space-sm);
            justify-content: center;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--light-brown);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: var(--transition-smooth);
            font-size: clamp(1.25rem, 4vw, 2rem);
            color: var(--primary-brown);
            font-weight: bold;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-medium);
            border-color: var(--accent-gold);
            background: var(--accent-gold);
            color: var(--primary-brown);
        }

        .social-btn.facebook:hover {
            background: #1877f2;
            border-color: #1877f2;
            color: var(--white);
        }

        .social-btn.instagram:hover {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border-color: #e6683c;
            color: var(--white);
        }

        .social-btn.twitter:hover {
            background: #1da1f2;
            border-color: #1da1f2;
            color: var(--white);
        }

        .social-btn.linkedin:hover {
            background: #0077b5;
            border-color: #0077b5;
            color: var(--white);
        }

        @media (max-width: 768px) {
            .auth-content {
                padding: 0.75rem;
            }

            .auth-form-wrapper {
                max-width: 100%;
            }

            .auth-form-container {
                padding: 1.25rem;
            }
        }

        @media (max-width: 480px) {
            .auth-form-container {
                padding: 1rem;
            }

            .btn-login {
                width: 80%;
                margin: 0 auto;
                display: block;
                padding: 0.75rem var(--space-lg);
                font-size: 0.95rem;
            }
        }

        /* Large desktop widths */
        @media (min-width: 1024px) {
            .auth-form-wrapper {
                max-width: 540px;
            }
        }

        @media (min-width: 1440px) {
            .auth-form-wrapper {
                max-width: 640px;
            }
        }
    </style>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page-body">

    <!-- Floating RTL & Theme Controls (top-right, outside card) -->
    <div class="auth-page-floating-controls">
        <button class="rtl-btn" id="rtl-toggle-card" aria-label="Toggle RTL" title="Toggle RTL">Rtl</button>
        <button id="theme-toggle-card" class="theme-btn" aria-label="Toggle theme">
            <span class="theme-icon-light">☀️</span>
            <span class="theme-icon-dark">🌙</span>
        </button>
    </div>

    <!-- Header -->
    <header class="header auth-header">
        <nav class="nav-container">
            <!-- Centered Header Logo/Brand -->
            <a href="index.html" class="logo" style="text-decoration: none;">
                <div class="logo-icon">
                    <svg class="logo-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
                        <line x1="6" y1="1" x2="6" y2="4"></line>
                        <line x1="10" y1="1" x2="10" y2="4"></line>
                        <line x1="14" y1="1" x2="14" y2="4"></line>
                    </svg>
                </div>
                <span>Brewora</span>
            </a>
        </nav>
    </header>




    <div class="auth-page-wrapper">
        <!-- Main Content -->

        <!-- Login Content -->
        <div class="auth-content">
            <div class="auth-form-wrapper">
                <div class="auth-form-container">
                    <!-- Website Logo and Name -->


                    <form class="auth-form" id="loginForm">
                        <h2
                            style="text-align: center; color: var(--primary-brown); font-family: var(--font-primary); margin-bottom: 0.5rem; font-weight: 500; font-size: clamp(1.5rem, 4vw, 2rem);">
                            Welcome Back</h2>
                        <h3 style="font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 500;">Login</h3>


                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" name="email" class="form-input"
                                placeholder="" required>
                        </div>

                        <div class="form-group">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-input"
                                placeholder="" required>
                        </div>

                        <div class="form-checkbox">
                            <div class="checkbox-group">
                                <input type="checkbox" id="remember" name="remember">
                                <label for="remember">Remember me</label>
                            </div>
                            <a href="#" class="forgot-password-link">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn-login">Login</button>

                        <div class="form-links">
                            <p>Don't have an account? <a href="register.html">Create Account</a></p>
                        </div>

                        <div class="social-login">
                            <h4>Or login with</h4>
                            <div class="social-buttons">
                                <a href="#" class="social-btn" aria-label="Login with Apple"
                                    style="background: #000; border-color: #000; color: #fff; display: flex; align-items: center; justify-content: center;">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                        <path
                                            d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z" />
                                    </svg>
                                </a>
                                <a href="#" class="social-btn" aria-label="Login with Google"
                                    style="background: #FFFFFF; border-color: #DDDDDD; color: #444;">
                                    <svg width="20" height="20" viewBox="0 0 24 24">
                                        <path fill="#4285F4"
                                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                        <path fill="#34A853"
                                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                        <path fill="#FBBC05"
                                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                                        <path fill="#EA4335"
                                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                                    </svg>
                                </a>
                                <a href="#" class="social-btn" aria-label="Login with Facebook"
                                    style="background: #1877F2; border-color: #1877F2; color: white;">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                                        <path
                                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/script.js"></script>
</body>

</html>
