<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="%23D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>'>
    <title>Seeds | Register</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-container" style="flex-direction: column; align-items: center;">
        <div style="display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 20px; width: 100%; max-width: 600px;">
            <button class="toggle-btn" id="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
            <button class="toggle-btn" id="rtl-toggle" aria-label="Toggle RTL">RTL</button>
        </div>
        <div class="auth-card" style="max-width: 600px;">
            <div style="margin-bottom: 25px;">
                <a href="index.html" class="logo" style="justify-content: center;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                      <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                      <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
                      <line x1="6" y1="1" x2="6" y2="4"></line>
                      <line x1="10" y1="1" x2="10" y2="4"></line>
                      <line x1="14" y1="1" x2="14" y2="4"></line>
                    </svg>
                    Seeds
                </a>
            </div>
            <h2 style="margin-bottom: 10px;">Wholesale Application</h2>
            <p style="color: var(--text-light); margin-bottom: 30px;">Partner with us to serve exceptional coffee.</p>
            
            <form action="login.html">
                <div class="form-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" class="form-control" required>
                        <i class="fas fa-eye toggle-password" data-target="password"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirm-password" class="form-control" required>
                        <i class="fas fa-eye toggle-password" data-target="confirm-password"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="volume">Estimated Weekly Volume</label>
                    <select id="volume" class="form-control">
                        <option>Under 20 lbs</option>
                        <option>20 - 50 lbs</option>
                        <option>50 - 100 lbs</option>
                        <option>100+ lbs</option>
                    </select>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px; margin-bottom: 20px;">Submit Application</button>
            </form>

            <div class="auth-divider">or register with</div>

            <div class="social-btns">
                <button class="btn-social">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.07-3.71 1.07-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.09H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.91l3.66-2.8z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.09l3.66 2.84c.87-2.6 3.3-4.55 6.16-4.55z" fill="#EA4335"/></svg>
                    Google
                </button>
                <button class="btn-social">
                    <svg viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-31.4-73.3-114.8-51.7-141.9zM224 80c26.9-32.4 44.7-77.4 39.7-122.4-40.6 1.6-89.8 26.9-118.9 60.9-26.1 30-49.1 76.4-43.1 120.3 45.4 3.5 91.3-26.5 122.3-58.8z"/></svg>
                    Apple
                </button>
            </div>
            
            <p style="color: var(--text-light); font-size: 0.9rem;">Already a partner? <a href="login.html" style="color: var(--secondary); font-weight: bold;">Login Here</a></p>
            <div style="margin-top: 20px;">
            </div>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
</body>
</html>
